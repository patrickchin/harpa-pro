name: p0-exit-gate
# Aggregate gate: P0 is "done" when this passes on dev. Adds the
# coverage check + AI fixture mode assertion that the per-job workflows
# above don't enforce on their own.
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]
jobs:
  exit:
    runs-on: ubuntu-latest
    env:
      AI_FIXTURE_MODE: replay
      TESTCONTAINERS_RYUK_DISABLED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @harpa/api-contract build
      - run: pnpm typecheck
      - name: Removal gates
        run: |
          bash scripts/check-no-supabase.sh
          bash scripts/check-no-unistyles.sh
          bash scripts/check-no-alert-alert.sh
          bash scripts/check-no-process-env-bang.sh
          bash scripts/check-no-hex-colors.sh
          bash scripts/check-scope-tests.sh
      - run: pnpm test
      - run: pnpm --filter @harpa/api test:integration
      - name: Assert AI_FIXTURE_MODE=replay (no live calls in CI)
        run: |
          if [ "$AI_FIXTURE_MODE" != "replay" ]; then
            echo "AI_FIXTURE_MODE must be replay in CI; got '$AI_FIXTURE_MODE'"
            exit 1
          fi
