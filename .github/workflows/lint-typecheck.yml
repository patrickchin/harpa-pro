name: lint-typecheck
on:
  pull_request:
  push:
    branches: [dev, main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @harpa/api-contract build
      - run: pnpm typecheck
      - name: Removal verification gates
        run: |
          bash scripts/check-no-supabase.sh
          bash scripts/check-no-unistyles.sh
          bash scripts/check-no-alert-alert.sh
          bash scripts/check-no-process-env-bang.sh
          bash scripts/check-no-hex-colors.sh
          bash scripts/check-scope-tests.sh
