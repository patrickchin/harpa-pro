name: contract
# Verifies the OpenAPI spec emitted by Hono matches the Zod schemas
# in @harpa/api-contract. Fully wired with content tests in P1.
on:
  pull_request:
  push:
    branches: [dev, main]
jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.3 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @harpa/api-contract build
      - name: Emit OpenAPI spec
        run: pnpm --filter @harpa/api spec:emit || echo 'spec emit placeholder — wired in P1'
